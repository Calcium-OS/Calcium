---
instances:
  - id:       calamares
    modules:
      - welcome
      - locale
      - keyboard
      - partition
      - users
      - summary
      - partition
      - mount
      - unpackfs
      - machineid
      - fstab
      - locale
      - keyboard
      - localecfg
      - grubcfg
      - initramfs
      - users
      - displaymanager
      - networkcfg
      - hwclock
      - services-openrc
      - bootloader
      - umount
      - finished

sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - users
      - summary
  - exec:
      - partition
      - mount
      - unpackfs
      - machineid
      - fstab
      - locale
      - keyboard
      - localecfg
      - grubcfg
      - initramfs
      - users
      - displaymanager
      - networkcfg
      - hwclock
      - services-openrc
      - bootloader
      - umount
  - show:
      - finished

branding: calcium
prompt-install: true
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: true

# catalyst configuration for Gentoo ISO builds
# imported from epox/ per agents.md

storedir: /var/tmp/catalyst
sharedir: /usr/share/catalyst
distdir: /var/cache/distfiles
portdir: /var/db/repos/gentoo
snapshot_cache: /var/tmp/catalyst/snapshot_cache
hash_function: blake2b
options: autoresume, ccache, kerncache, pkgcache
envscript: /etc/catalyst/env.sh
port_logdir: /var/tmp/catalyst/log

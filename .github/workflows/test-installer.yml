name: Test Installer

on:
  push:
    branches: [main]
    paths:
      - 'epox/rootfs-overlay/usr/bin/calcium-installer'
      - 'epox/rootfs-overlay/usr/bin/calcium-update'
      - 'epox/rootfs-overlay/usr/bin/calcium-install-unattended'
      - 'epox/rootfs-overlay/etc/calcium-release'
      - 'epox/rootfs-overlay/usr/share/calcium-installer/**'
      - 'epox/scripts/fsscript.sh'
      - '.github/workflows/test-installer.yml'
  pull_request:
    branches: [main]
    paths:
      - 'epox/rootfs-overlay/usr/bin/calcium-installer'
      - 'epox/rootfs-overlay/usr/bin/calcium-update'
      - 'epox/rootfs-overlay/usr/bin/calcium-install-unattended'
      - 'epox/rootfs-overlay/etc/calcium-release'
      - 'epox/rootfs-overlay/usr/share/calcium-installer/**'
      - 'epox/scripts/fsscript.sh'
  workflow_run:
    workflows: ["Build Gentoo ISO (GNOME + OpenRC + Zsh)"]
    types: [completed]
  workflow_dispatch:

env:
  ISO_NAME: gentoo-gnome-openrc-amd64

jobs:
  unit-test:
    if: github.event_name != 'workflow_run'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: epox/rootfs-overlay/usr/share/calcium-installer

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-gi \
            python3-gi-cairo \
            gir1.2-gtk-4.0 \
            gir1.2-adw-1 \
            libgsound-dev \
            bash

      - name: Check Python syntax
        run: |
          python3 -m py_compile calcium_installer/__init__.py
          python3 -m py_compile calcium_installer/app.py
          python3 -m py_compile calcium_installer/backend.py
          python3 -m py_compile calcium_installer/views.py
          python3 -m py_compile ../../../usr/bin/calcium-installer

      - name: Test module imports
        run: |
          python3 -c "
          import sys
          sys.path.insert(0, '.')
          from calcium_installer.backend import InstallerBackend
          from calcium_installer.views import WelcomePage, DiskPage, UserPage, SummaryPage, InstallPage, FinishPage
          from calcium_installer.app import CalciumInstallerApp
          print('All modules imported successfully')
          "

      - name: Test backend disk detection (read-only)
        run: |
          python3 -c "
          import sys, json
          sys.path.insert(0, '.')
          from calcium_installer.backend import InstallerBackend
          backend = InstallerBackend()
          disks = backend.get_disks()
          print(f'Disk detection works: {len(disks)} disks found')
          for d in disks:
              assert 'path' in d, 'Missing path'
              assert 'size' in d, 'Missing size'
              assert 'name' in d, 'Missing name'
          print('Disk data structure valid')
          "

      - name: Validate fsscript.sh syntax
        run: |
          bash -n ../../../../scripts/fsscript.sh
          echo "fsscript.sh syntax OK"

      - name: List all extensions
        run: |
          echo "=== GNOME Extensions ==="
          ls -1 ../../../usr/share/gnome-shell/extensions/ 2>/dev/null || echo "No extensions dir"

      - name: Validate calcium-update syntax
        run: |
          bash -n ../../../usr/bin/calcium-update
          echo "calcium-update syntax OK"

      - name: Test calcium-update backup and apply logic
        run: |
          TMPDIR=$(mktemp -d)
          mkdir -p "$TMPDIR/etc" "$TMPDIR/home/user" "$TMPDIR/var/lib" "$TMPDIR/boot"
          echo "CALCIUM_VERSION=0.1.0" > "$TMPDIR/etc/calcium-release"
          MOCKROOT=$(mktemp -d)
          mkdir -p "$MOCKROOT/etc" "$MOCKROOT/usr/bin"
          echo "new-release" > "$MOCKROOT/etc/release-file"
          echo "new-binary" > "$MOCKROOT/usr/bin/some-tool"
          tar -cJf /tmp/mock-rootfs.tar.xz -C "$MOCKROOT" .
          BACKUP_DIR="$TMPDIR/backups"
          mkdir -p "$BACKUP_DIR/test1"
          tar -czf "$BACKUP_DIR/test1/etc.tar.gz" -C "$TMPDIR" etc/
          tar -czf "$BACKUP_DIR/test1/var.tar.gz" -C "$TMPDIR" var/lib/
          echo "0.0.9" > "$BACKUP_DIR/test1/prev-version"
          mkdir -p "$TMPDIR/restore-test"
          tar -xzf "$BACKUP_DIR/test1/var.tar.gz" -C "$TMPDIR/restore-test" 2>/dev/null || true
          tar -xJf /tmp/mock-rootfs.tar.xz \
            --exclude=etc --exclude=home --exclude=var --exclude=root -C "$TMPDIR"
          [ -f "$TMPDIR/usr/bin/some-tool" ] && echo "PASS: new binary extracted"
          [ ! -f "$TMPDIR/etc/release-file" ] && echo "PASS: /etc preserved (not overwritten)"
          rm -rf "$TMPDIR" "$MOCKROOT" /tmp/mock-rootfs.tar.xz
          echo "All update mechanism tests passed"

  integration-test:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install VM dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            qemu-system-x86_64 qemu-utils ovmf genisoimage expect

      - name: Download ISO from build
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ISO_NAME }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Extract kernel and initrd from ISO
        run: |
          FILES=$(isoinfo -R -f -i ${{ env.ISO_NAME }}.iso)
          KERNEL=$(echo "$FILES" | grep -E 'vmlinuz|vmlinux|kernel' | head -1)
          INITRD=$(echo "$FILES" | grep -E 'initramfs|initrd' | head -1)
          echo "Kernel: $KERNEL  Initrd: $INITRD"
          isoinfo -R -x "$KERNEL" -i ${{ env.ISO_NAME }}.iso > /tmp/vmlinuz
          isoinfo -R -x "$INITRD" -i ${{ env.ISO_NAME }}.iso > /tmp/initrd.img

      - name: Create disk image
        run: qemu-img create -f qcow2 /tmp/disk.qcow2 20G

      - name: Install to disk via QEMU
        run: |
          expect << 'INSTALLEOF'
            set timeout 600
            spawn qemu-system-x86_64 -enable-kvm -m 4096 -smp 2 \
              -cdrom /tmp/${{ env.ISO_NAME }}.iso \
              -drive file=/tmp/disk.qcow2,format=qcow2,if=virtio \
              -kernel /tmp/vmlinuz -initrd /tmp/initrd.img \
              -append "root=live:CDLABEL=Gentoo_GNOME_Live console=ttyS0,115200 quiet" \
              -nographic -serial mon:stdio -no-reboot
            expect "login:"
            send "root\r"
            expect "# "
            send "cat > /etc/calcium-install.json << 'EOF'\n"
            send "{\"disk\": \"/dev/vda\", \"luks_password\": \"test\", \"hostname\": \"calcium-test\", \"username\": \"calcium\", \"password\": \"test\"}\n"
            send "EOF\n"
            expect "# "
            send "calcium-install-unattended /etc/calcium-install.json 2>&1\n"
            expect "Installation complete!"
            send "poweroff\n"
            expect eof
          INSTALLEOF

      - name: Boot from disk and test system
        run: |
          expect << 'TESTEOF'
            set timeout 120
            spawn qemu-system-x86_64 -enable-kvm -m 4096 -smp 2 \
              -bios /usr/share/ovmf/OVMF.fd \
              -drive file=/tmp/disk.qcow2,format=qcow2,if=virtio \
              -nographic -serial mon:stdio -no-reboot
            expect {
              "login:" { }
              timeout { puts "Timeout waiting for login"; exit 1 }
            }
            send "root\r"
            expect "# "
            send "cat /etc/calcium-release\n"
            expect "CALCIUM_VERSION"
            send "hostname\n"
            expect "calcium-test"
            send "dmsetup ls 2>&1 || true\n"
            expect "# "
            send "rc-service gdm status 2>&1 || true\n"
            expect "# "
            send "rc-service gdm start 2>&1 || true\n"
            expect "# "
            send "su - livecd -c 'XDG_SESSION_TYPE=wayland dbus-run-session gnome-session --headless 2>&1' || true\n"
            expect "# "
            send "calcium-update check 2>&1 || true\n"
            expect "# "
            send "mkdir -p /tmp/mock-update/usr/bin\n"
            send "echo 'new-binary' > /tmp/mock-update/usr/bin/test-tool\n"
            send "cd /tmp/mock-update && tar -cJf /tmp/mock-rootfs.tar.xz . && cd /\n"
            expect "# "
            send "tar -xJf /tmp/mock-rootfs.tar.xz --exclude=etc --exclude=home --exclude=var --exclude=root -C / 2>&1\n"
            expect "# "
            send "[ -f /usr/bin/test-tool ] && echo 'PASS: update extraction works'\n"
            expect "# "
            send "rm -f /usr/bin/test-tool /tmp/mock-rootfs.tar.xz\n"
            send "poweroff\n"
            expect eof
          TESTEOF

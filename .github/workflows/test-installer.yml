name: Test Installer

on:
  push:
    branches: [main]
    paths:
      - 'epox/rootfs-overlay/usr/bin/calcium-installer'
      - 'epox/rootfs-overlay/usr/bin/calcium-update'
      - 'epox/rootfs-overlay/usr/bin/calcium-install-unattended'
      - 'epox/rootfs-overlay/etc/calcium-release'
      - 'epox/rootfs-overlay/usr/share/calcium-installer/**'
      - 'epox/scripts/fsscript.sh'
      - 'epox/scripts/fsscript-server.sh'
      - '.github/workflows/test-installer.yml'
  pull_request:
    branches: [main]
    paths:
      - 'epox/rootfs-overlay/usr/bin/calcium-installer'
      - 'epox/rootfs-overlay/usr/bin/calcium-update'
      - 'epox/rootfs-overlay/usr/bin/calcium-install-unattended'
      - 'epox/rootfs-overlay/etc/calcium-release'
      - 'epox/rootfs-overlay/usr/share/calcium-installer/**'
      - 'epox/scripts/fsscript.sh'
      - 'epox/scripts/fsscript-server.sh'
      - '.github/workflows/test-installer.yml'
  workflow_run:
    workflows: ["Build Gentoo ISOs"]
    types: [completed]
  workflow_dispatch:

env:
  GNOME_ISO: gentoo-gnome-openrc-amd64
  SERVER_ISO: gentoo-server-openrc-amd64

jobs:
  unit-test:
    if: github.event_name != 'workflow_run'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: epox/rootfs-overlay/usr/share/calcium-installer

    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-gi \
            python3-gi-cairo \
            gir1.2-gtk-4.0 \
            gir1.2-adw-1 \
            libgsound-dev \
            bash

      - name: Check Python syntax
        run: |
          python3 -m py_compile calcium_installer/__init__.py
          python3 -m py_compile calcium_installer/app.py
          python3 -m py_compile calcium_installer/backend.py
          python3 -m py_compile calcium_installer/views.py
          python3 -m py_compile ../../../usr/bin/calcium-installer

      - name: Test module imports
        run: |
          python3 -c "
          import sys
          sys.path.insert(0, '.')
          from calcium_installer.backend import InstallerBackend
          from calcium_installer.views import WelcomePage, DiskPage, UserPage, SummaryPage, InstallPage, FinishPage
          from calcium_installer.app import CalciumInstallerApp
          print('All modules imported successfully')
          "

      - name: Test backend disk detection (read-only)
        run: |
          python3 -c "
          import sys, json
          sys.path.insert(0, '.')
          from calcium_installer.backend import InstallerBackend
          backend = InstallerBackend()
          disks = backend.get_disks()
          print(f'Disk detection works: {len(disks)} disks found')
          for d in disks:
              assert 'path' in d, 'Missing path'
              assert 'size' in d, 'Missing size'
              assert 'name' in d, 'Missing name'
          print('Disk data structure valid')
          "

      - name: Validate fsscript.sh syntax
        run: |
          bash -n ../../../../scripts/fsscript.sh
          echo "fsscript.sh syntax OK"

      - name: Validate fsscript-server.sh syntax
        run: |
          bash -n ../../../../scripts/fsscript-server.sh
          echo "fsscript-server.sh syntax OK"

      - name: Validate calcium-update syntax
        run: |
          bash -n ../../../usr/bin/calcium-update
          echo "calcium-update syntax OK"

      - name: Test calcium-update backup and apply logic
        run: |
          TMPDIR=$(mktemp -d)
          mkdir -p "$TMPDIR/etc" "$TMPDIR/home/user" "$TMPDIR/var/lib" "$TMPDIR/boot"
          echo "CALCIUM_VERSION=0.1.0" > "$TMPDIR/etc/calcium-release"
          MOCKROOT=$(mktemp -d)
          mkdir -p "$MOCKROOT/etc" "$MOCKROOT/usr/bin"
          echo "new-release" > "$MOCKROOT/etc/release-file"
          echo "new-binary" > "$MOCKROOT/usr/bin/some-tool"
          tar -cJf /tmp/mock-rootfs.tar.xz -C "$MOCKROOT" .
          BACKUP_DIR="$TMPDIR/backups"
          mkdir -p "$BACKUP_DIR/test1"
          tar -czf "$BACKUP_DIR/test1/etc.tar.gz" -C "$TMPDIR" etc/
          tar -czf "$BACKUP_DIR/test1/var.tar.gz" -C "$TMPDIR" var/lib/
          echo "0.0.9" > "$BACKUP_DIR/test1/prev-version"
          mkdir -p "$TMPDIR/restore-test"
          tar -xzf "$BACKUP_DIR/test1/var.tar.gz" -C "$TMPDIR/restore-test" 2>/dev/null || true
          tar -xJf /tmp/mock-rootfs.tar.xz \
            --exclude=etc --exclude=home --exclude=var --exclude=root -C "$TMPDIR"
          [ -f "$TMPDIR/usr/bin/some-tool" ] && echo "PASS: new binary extracted"
          [ ! -f "$TMPDIR/etc/release-file" ] && echo "PASS: /etc preserved (not overwritten)"
          rm -rf "$TMPDIR" "$MOCKROOT" /tmp/mock-rootfs.tar.xz
          echo "All update mechanism tests passed"

  integration-test:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: gnome
            iso_name: gentoo-gnome-openrc-amd64
            cdlab: Gentoo_GNOME_Live
          - name: server
            iso_name: gentoo-server-openrc-amd64
            cdlab: Gentoo_Server_Live
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v7

      - name: Install VM dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            qemu-system-x86 qemu-utils ovmf genisoimage expect

      - name: Download ISO from build
        uses: actions/download-artifact@v7
        with:
          name: ${{ matrix.variant.iso_name }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Create disk image
        run: qemu-img create -f qcow2 /tmp/disk.qcow2 20G

      - name: Install to disk via QEMU (LUKS)
        run: |
          expect << 'INSTALLEOF'
            set timeout 900
            set ready 0
            spawn qemu-system-x86_64 -enable-kvm -m 4096 -smp 2 \
              -cdrom /tmp/${{ matrix.variant.iso_name }}.iso \
              -drive file=/tmp/disk.qcow2,format=qcow2,if=virtio \
              -bios /usr/share/ovmf/OVMF.fd \
              -nographic -serial mon:stdio -no-reboot -nic user
            expect {
              -re {login:.*#?} { set ready 1 }
              -re {localhost.*login:} { set ready 1 }
              "localhost" { set ready 1 }
              timeout { puts "Timeout waiting for login prompt"; exit 1 }
              eof { puts "Unexpected EOF before login"; exit 1 }
            }
            if { $ready == 0 } {
              puts "Did not reach login prompt"
              exit 1
            }
            sleep 5
            send "root\r"
            expect {
              -re {#\s*$} { }
              -re {[Pp]assword} { send "\r"; expect -re {#\s*$} }
              timeout { puts "Timeout waiting for root shell"; exit 1 }
            }
            send "cat > /etc/calcium-install.json << 'EOF'\n"
            send "{\"disk\": \"/dev/vda\", \"luks_password\": \"test\", \"hostname\": \"calcium-test\", \"username\": \"calcium\", \"password\": \"test\", \"root_password\": \"test\"}\n"
            send "EOF\n"
            expect -re {#\s*$}
            send "calcium-install-unattended /etc/calcium-install.json 2>&1\n"
            expect {
              "Installation complete!" { }
              -re {FAILED|failed|error} { puts "Installation failed"; exit 1 }
              timeout { puts "Timeout during installation"; exit 1 }
              eof { puts "Unexpected EOF during installation"; exit 1 }
            }
            send "poweroff\n"
            expect eof
          INSTALLEOF

      - name: Boot from installed system and verify
        run: |
          timeout 240 expect -c '
            set timeout 180
            spawn qemu-system-x86_64 -enable-kvm -m 4096 -smp 2 \
              -bios /usr/share/ovmf/OVMF.fd \
              -drive file=/tmp/disk.qcow2,format=qcow2,if=virtio \
              -nographic -serial mon:stdio -no-reboot -nic user
            expect {
              -re {[Pp]assphrase|[Pp]assword} { send "test\r"; exp_continue }
              -re {login:.*#?} { }
              timeout { puts "Timeout waiting for login prompt"; exit 1 }
              eof { puts "Unexpected EOF during boot"; exit 1 }
            }
            sleep 3
            send "root\r"
            expect {
              -re {#\s*$} { }
              -re {[Pp]assword} { send "test\r"; expect -re {#\s*$} }
              timeout { puts "Timeout waiting for root shell"; exit 1 }
            }
            send "cat /etc/calcium-release\n"
            expect {
              "CALCIUM_VERSION" { }
              timeout { puts "calcium-release not found"; exit 1 }
            }
            send "hostname\n"
            expect {
              "calcium-test" { }
              timeout { puts "Hostname check failed"; exit 1 }
            }
            send "df -h /\n"
            expect {
              -re {/dev/mapper/} { }
              timeout { puts "Root not on LUKS device"; exit 1 }
            }
            send "cryptsetup status calcium-root 2>&1 || dmsetup table 2>&1\n"
            expect {
              -re {active|calcium-root} { }
              timeout { puts "cryptsetup status failed"; exit 1 }
            }

            # SECURITY: Verify kernel patched against Copy Fail (CVE-2026-31431)
            send "uname -r\n"
            expect {
              -re {[\d]+\.[\d]+\.[\d]+} { }
              timeout { puts "Kernel version check failed"; exit 1 }
            }
            send "lsmod | grep ^algif_aead; echo \"CF_STAT=\\$?\"\n"
            expect {
              -re {CF_STAT=1} { }
              timeout { puts "Copy Fail module check failed"; exit 1 }
            }
            send "grep '^blacklist algif_aead' /etc/modprobe.d/lpe-mitigations.conf; echo \"CF_BL=\\$?\"\n"
            expect {
              -re {CF_BL=0} { }
              timeout { puts "Copy Fail blacklist missing"; exit 1 }
            }

            # SECURITY: Verify kernel patched against Dirty Frag (CVE-2026-43284, CVE-2026-43500)
            send "lsmod | grep -E '^(esp4|esp6|rxrpc)'; echo \"DF_STAT=\\$?\"\n"
            expect {
              -re {DF_STAT=1} { }
              timeout { puts "Dirty Frag module check failed (expected modules not loaded)"; exit 1 }
            }

            # SECURITY: Verify kernel patched against Fragnesia (CVE-2026-46300)
            send "grep -E '^blacklist (esp4|esp6|rxrpc)' /etc/modprobe.d/lpe-mitigations.conf; echo \"FG_STAT=\\$?\"\n"
            expect {
              -re {FG_STAT=0} { }
              timeout { puts "Fragnesia blacklist check failed"; exit 1 }
            }

            send "poweroff\n"
            expect eof
          '

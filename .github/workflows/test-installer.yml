name: Test Installer

on:
  push:
    branches: [main]
    paths:
      - 'epox/rootfs-overlay/usr/bin/calcium-installer'
      - 'epox/rootfs-overlay/usr/bin/calcium-update'
      - 'epox/rootfs-overlay/usr/bin/calcium-install-unattended'
      - 'epox/rootfs-overlay/etc/calcium-release'
      - 'epox/rootfs-overlay/usr/share/calcium-installer/**'
      - 'epox/scripts/fsscript.sh'
      - '.github/workflows/test-installer.yml'
  pull_request:
    branches: [main]
    paths:
      - 'epox/rootfs-overlay/usr/bin/calcium-installer'
      - 'epox/rootfs-overlay/usr/bin/calcium-update'
      - 'epox/rootfs-overlay/usr/bin/calcium-install-unattended'
      - 'epox/rootfs-overlay/etc/calcium-release'
      - 'epox/rootfs-overlay/usr/share/calcium-installer/**'
      - 'epox/scripts/fsscript.sh'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: epox/rootfs-overlay/usr/share/calcium-installer

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-gi \
            python3-gi-cairo \
            gir1.2-gtk-4.0 \
            gir1.2-adw-1 \
            libgsound-dev \
            bash

      - name: Check Python syntax
        run: |
          python3 -m py_compile calcium_installer/__init__.py
          python3 -m py_compile calcium_installer/app.py
          python3 -m py_compile calcium_installer/backend.py
          python3 -m py_compile calcium_installer/views.py
          python3 -m py_compile ../../../../usr/bin/calcium-installer

      - name: Test module imports
        run: |
          python3 -c "
          import sys
          sys.path.insert(0, '.')
          from calcium_installer.backend import InstallerBackend
          from calcium_installer.views import WelcomePage, DiskPage, UserPage, SummaryPage, InstallPage, FinishPage
          from calcium_installer.app import CalciumInstallerApp
          print('All modules imported successfully')
          "

      - name: Test backend disk detection (read-only)
        run: |
          python3 -c "
          import sys, json
          sys.path.insert(0, '.')
          from calcium_installer.backend import InstallerBackend
          backend = InstallerBackend()
          disks = backend.get_disks()
          print(f'Disk detection works: {len(disks)} disks found')
          for d in disks:
              assert 'path' in d, 'Missing path'
              assert 'size' in d, 'Missing size'
              assert 'name' in d, 'Missing name'
          print('Disk data structure valid')
          "

      - name: Validate fsscript.sh syntax
        run: |
          bash -n ../../scripts/fsscript.sh
          echo "fsscript.sh syntax OK"

      - name: List all extensions
        run: |
          echo "=== GNOME Extensions ==="
          ls -1 ../../../../../usr/share/gnome-shell/extensions/ 2>/dev/null || echo "No extensions dir"

      - name: Validate calcium-update syntax
        run: |
          bash -n ../../../usr/bin/calcium-update
          echo "calcium-update syntax OK"

      - name: Test calcium-update backup and apply logic
        run: |
          TMPDIR=$(mktemp -d)
          mkdir -p "$TMPDIR/etc" "$TMPDIR/home/user" "$TMPDIR/var/lib" "$TMPDIR/boot"

          echo "CALCIUM_VERSION=0.1.0" > "$TMPDIR/etc/calcium-release"

          MOCKROOT=$(mktemp -d)
          mkdir -p "$MOCKROOT/etc" "$MOCKROOT/usr/bin"
          echo "new-release" > "$MOCKROOT/etc/release-file"
          echo "new-binary" > "$MOCKROOT/usr/bin/some-tool"

          tar -cJf /tmp/mock-rootfs.tar.xz -C "$MOCKROOT" .

          BACKUP_DIR="$TMPDIR/backups"
          mkdir -p "$BACKUP_DIR/test1"

          tar -czf "$BACKUP_DIR/test1/etc.tar.gz" -C "$TMPDIR" etc/
          tar -czf "$BACKUP_DIR/test1/var.tar.gz" -C "$TMPDIR" var/lib/

          echo "0.0.9" > "$BACKUP_DIR/test1/prev-version"

          echo "Mock backup created: $(ls -la $BACKUP_DIR/test1/)"

          mkdir -p "$TMPDIR/restore-test"
          tar -xzf "$BACKUP_DIR/test1/var.tar.gz" -C "$TMPDIR/restore-test" 2>/dev/null || true

          tar -xJf /tmp/mock-rootfs.tar.xz \
            --exclude=etc \
            --exclude=home \
            --exclude=var \
            --exclude=root \
            -C "$TMPDIR"

          [ -f "$TMPDIR/usr/bin/some-tool" ] && echo "PASS: new binary extracted"
          [ ! -f "$TMPDIR/etc/release-file" ] && echo "PASS: /etc preserved (not overwritten)"

          rm -rf "$TMPDIR" "$MOCKROOT" /tmp/mock-rootfs.tar.xz
          echo "All update mechanism tests passed"

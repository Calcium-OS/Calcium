name: Build Gentoo ISO (GNOME + OpenRC + Zsh)

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/workflows/test-installer.yml'
  workflow_dispatch:

env:
  ISO_NAME: gentoo-gnome-openrc-amd64
  CATALYST_STOREDIR: /var/tmp/catalyst
  STAGE3_BASE: https://distfiles.gentoo.org/releases/amd64/autobuilds

jobs:
  build-iso:
    runs-on: ubuntu-latest
    container:
      image: gentoo/stage3:latest
      options: --privileged --cap-add=ALL -v /dev:/dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize Portage tree and install catalyst
        env:
          PORTAGE_BINHOST: https://distfiles.gentoo.org/releases/amd64/binpackages/23.0/x86-64
        run: |
          mkdir -p /etc/portage/repos.conf
          printf '%s\n' '[gentoo]' 'location = /var/db/repos/gentoo' 'sync-type = webrsync' 'auto-sync = yes' > /etc/portage/repos.conf/gentoo.conf
          emerge-webrsync
          emerge --oneshot --getbinpkg sys-devel/bc
          mkdir -p /etc/portage/package.accept_keywords
          printf '%s\n' 'dev-util/catalyst ~amd64' > /etc/portage/package.accept_keywords/catalyst
          mkdir -p /etc/portage/package.use
          printf '%s\n' '>=sys-apps/util-linux-2.41.4-r1 python' '>=sys-boot/grub-2.14-r5 grub_platforms_efi-32' > /etc/portage/package.use/catalyst
          emerge --getbinpkg catalyst dev-vcs/git sys-fs/squashfs-tools sys-boot/efibootmgr

      - name: Configure catalyst
        run: |
          mkdir -p "$CATALYST_STOREDIR" /var/tmp/ccache
          cp -v epox/catalyst.conf /etc/catalyst/catalyst.conf
          mkdir -p /etc/catalyst
          cp -rv epox/portage /etc/catalyst/portage
          cp -v epox/env/catalystrc /etc/catalyst/env.sh

      - name: Set Gentoo mirrors
        run: |
          MIRRORS='GENTOO_MIRRORS="https://distfiles.gentoo.org https://mirror.rackspace.com/gentoo/ https://mirrors.rit.edu/gentoo/"'
          echo "$MIRRORS"
          sed -i "/^export GENTOO_MIRRORS/d" /etc/catalyst/env.sh
          echo "export $MIRRORS" >> /etc/catalyst/env.sh
          echo "$MIRRORS" >> /etc/portage/make.conf

      - name: Cache portage binary packages
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/binpkgs
            /var/tmp/catalyst/packages
            /var/tmp/ccache
          key: catalyst-${{ hashFiles('epox/portage/**', 'epox/gentoo-gnome.spec', 'epox/catalyst.conf', 'epox/scripts/fsscript.sh') }}
          restore-keys: catalyst-

      - name: Get latest seed stage3 filename
        id: seed-version
        run: |
          LATEST=$(wget -q -O- "$STAGE3_BASE/latest-stage3-amd64-openrc.txt" | sed -n '/^[0-9]/p' | head -1 | cut -d' ' -f1)
          echo "filename=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Seed: $LATEST"

      - name: Cache seed stage3
        id: cache-seed
        uses: actions/cache@v4
        with:
          path: /var/tmp/catalyst/builds/default/stage3-amd64-openrc-latest.tar.xz
          key: seed-stage3-${{ steps.seed-version.outputs.filename }}

      - name: Download seed stage3
        if: steps.cache-seed.outputs.cache-hit != 'true'
        run: |
          mkdir -p /var/tmp/catalyst/builds/default
          wget -q "$STAGE3_BASE/${{ steps.seed-version.outputs.filename }}" -O /var/tmp/catalyst/builds/default/stage3-amd64-openrc-latest.tar.xz

      - name: Set up repository symlink for catalyst spec
        run: |
          ln -sf "$GITHUB_WORKSPACE" /repo

      - name: Create portage snapshot for catalyst
        run: |
          mkdir -p "$CATALYST_STOREDIR"/snapshots "$CATALYST_STOREDIR"/repos
          git clone --quiet --depth=1 --bare \
            -c gc.reflogExpire=0 -c gc.reflogExpireUnreachable=0 \
            -c gc.rerereresolved=0 -c gc.rerereunresolved=0 \
            -c gc.pruneExpire=now \
            --branch=stable \
            https://anongit.gentoo.org/git/repo/sync/gentoo.git \
            "$CATALYST_STOREDIR"/repos/gentoo.git
          SNAPSHOT="$CATALYST_STOREDIR"/snapshots/gentoo-stable.sqfs
          git -C "$CATALYST_STOREDIR"/repos/gentoo.git archive --format=tar stable \
            | tar2sqfs "$SNAPSHOT" -q -f -j1 -c gzip
          echo "Snapshot created: $SNAPSHOT ($(stat -c%s "$SNAPSHOT") bytes)"

      - name: Build livecd-stage2 ISO via catalyst
        run: |
          export CATALYST_STOREDIR
          catalyst -f /repo/epox/gentoo-gnome.spec

      - name: Install ISO extraction tools
        run: |
          emerge --getbinpkg app-cdr/cdrtools sys-fs/squashfs-tools

      - name: Create rootfs tarball from ISO
        run: |
          isoinfo -R -x /image.squashfs -i /${{ env.ISO_NAME }}.iso 2>/dev/null > /tmp/image.squashfs
          mkdir -p /tmp/rootfs
          unsquashfs -d /tmp/rootfs /tmp/image.squashfs >/dev/null 2>&1
          cd /tmp/rootfs
          tar --exclude=home/livecd \
              --exclude=root/.cache \
              --exclude=var/cache \
              --exclude=var/tmp \
              --exclude=var/db/repos \
              --exclude=var/log \
              -cJf /calcium-rootfs.tar.xz .
          cd /
          echo "Rootfs tarball: $(stat -c%s /calcium-rootfs.tar.xz) bytes"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ISO_NAME }}
          path: /${{ env.ISO_NAME }}.iso
          compression-level: 0

      - name: Upload rootfs tarball
        uses: actions/upload-artifact@v4
        with:
          name: calcium-rootfs
          path: /calcium-rootfs.tar.xz
          compression-level: 0

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-iso
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download ISO
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ISO_NAME }}

      - name: Download rootfs tarball
        uses: actions/download-artifact@v4
        with:
          name: calcium-rootfs

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            --title "Calcium OS v$VERSION" \
            --notes "Calcium OS v$VERSION release." \
            ${{ env.ISO_NAME }}.iso \
            calcium-rootfs.tar.xz

  test-vm:
    if: github.ref == 'refs/heads/main'
    needs: build-iso
    runs-on: ubuntu-latest
    steps:
      - name: Install VM dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            qemu-system-x86_64 qemu-utils ovmf genisoimage expect

      - name: Download ISO
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ISO_NAME }}

      - name: Extract kernel and initrd from ISO
        run: |
          FILES=$(isoinfo -R -f -i ${{ env.ISO_NAME }}.iso)
          echo "ISO contents:"
          echo "$FILES"
          KERNEL=$(echo "$FILES" | grep -E 'vmlinuz|vmlinux|kernel' | head -1)
          INITRD=$(echo "$FILES" | grep -E 'initramfs|initrd' | head -1)
          echo "Kernel path: $KERNEL"
          echo "Initrd path: $INITRD"
          isoinfo -R -x "$KERNEL" -i ${{ env.ISO_NAME }}.iso > /tmp/vmlinuz
          isoinfo -R -x "$INITRD" -i ${{ env.ISO_NAME }}.iso > /tmp/initrd.img

      - name: Create disk image
        run: qemu-img create -f qcow2 /tmp/disk.qcow2 20G

      - name: Install to disk via QEMU
        run: |
          expect << 'INSTALLEOF'
            set timeout 600
            spawn qemu-system-x86_64 -enable-kvm -m 4096 -smp 2 \
              -cdrom /tmp/${{ env.ISO_NAME }}.iso \
              -drive file=/tmp/disk.qcow2,format=qcow2,if=virtio \
              -kernel /tmp/vmlinuz -initrd /tmp/initrd.img \
              -append "root=live:CDLABEL=Gentoo_GNOME_Live console=ttyS0,115200 quiet" \
              -nographic -serial mon:stdio -no-reboot
            expect "login:"
            send "root\r"
            expect "# "
            send "cat > /etc/calcium-install.json << 'EOF'\n"
            send "{\"disk\": \"/dev/vda\", \"luks_password\": \"test\", \"hostname\": \"calcium-test\", \"username\": \"calcium\", \"password\": \"test\"}\n"
            send "EOF\n"
            expect "# "
            send "calcium-install-unattended /etc/calcium-install.json 2>&1\n"
            expect "Installation complete!"
            send "poweroff\n"
            expect eof
          INSTALLEOF

      - name: Boot from disk and test system
        run: |
          expect << 'TESTEOF'
            set timeout 120
            spawn qemu-system-x86_64 -enable-kvm -m 4096 -smp 2 \
              -bios /usr/share/ovmf/OVMF.fd \
              -drive file=/tmp/disk.qcow2,format=qcow2,if=virtio \
              -nographic -serial mon:stdio -no-reboot
            expect {
              "login:" { }
              timeout { puts "Timeout waiting for login"; exit 1 }
            }
            send "root\r"
            expect "# "

            send "echo '=== System Info ==='\n"
            expect "# "
            send "uname -a\n"
            expect "# "
            send "cat /etc/calcium-release\n"
            expect "CALCIUM_VERSION"
            send "hostname\n"
            expect "calcium-test"

            send "echo '=== LUKS check ==='\n"
            expect "# "
            send "dmsetup ls 2>&1 || true\n"
            expect "# "

            send "echo '=== GDM check ==='\n"
            expect "# "
            send "rc-service gdm status 2>&1 || true\n"
            expect "# "
            send "echo '(If GDM not running, starting it...)'\n"
            expect "# "
            send "rc-service gdm start 2>&1 || true\n"
            expect "# "
            send "echo '(Trying fallback GNOME session...)'\n"
            expect "# "
            send "su - livecd -c 'XDG_SESSION_TYPE=wayland dbus-run-session gnome-session --headless 2>&1' || true\n"
            expect "# "

            send "echo '=== Update check ==='\n"
            expect "# "
            send "calcium-update check 2>&1 || true\n"
            expect "# "

            send "echo '=== Mock update test ==='\n"
            expect "# "
            send "echo 'CALCIUM_VERSION=0.0.0' > /etc/calcium-release\n"
            expect "# "
            send "mkdir -p /tmp/mock-update/usr/bin\n"
            send "echo 'new-binary' > /tmp/mock-update/usr/bin/test-tool\n"
            send "cd /tmp/mock-update && tar -cJf /tmp/mock-rootfs.tar.xz . && cd /\n"
            expect "# "
            send "tar -xJf /tmp/mock-rootfs.tar.xz --exclude=etc --exclude=home --exclude=var --exclude=root -C / 2>&1\n"
            expect "# "
            send "[ -f /usr/bin/test-tool ] && echo 'PASS: Update extraction works'\n"
            expect "# "
            send "echo 'CALCIUM_VERSION=0.1.0' > /etc/calcium-release\n"
            expect "# "
            send "rm -f /usr/bin/test-tool /tmp/mock-rootfs.tar.xz\n"

            send "poweroff\n"
            expect eof
          TESTEOF

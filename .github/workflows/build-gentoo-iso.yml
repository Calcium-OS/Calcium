name: Build Gentoo ISOs

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/workflows/test-installer.yml'
  workflow_dispatch:

env:
  CATALYST_STOREDIR: /var/tmp/catalyst
  STAGE3_BASE: https://distfiles.gentoo.org/releases/amd64/autobuilds
  PORTAGE_BINHOST: https://distfiles.gentoo.org/releases/amd64/binpackages/23.0/x86-64

jobs:
  build-iso:
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: gnome
            spec_file: epox/gentoo-gnome.spec
            iso_name: gentoo-gnome-openrc-amd64
            portage_dir: epox/portage
            portage_confdir: /etc/catalyst/portage
            target: gnome
          - name: server
            spec_file: epox/gentoo-server.spec
            iso_name: gentoo-server-openrc-amd64
            portage_dir: epox/portage-server
            portage_confdir: /etc/catalyst/portage-server
            target: server

    runs-on: blacksmith-4vcpu-ubuntu-2404
    container:
      image: gentoo/stage3:latest
      options: --privileged --cap-add=ALL -v /dev:/dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize Portage tree and install catalyst
        run: |
          mkdir -p /etc/portage/repos.conf
          printf '%s\n' '[gentoo]' 'location = /var/db/repos/gentoo' 'sync-type = webrsync' 'auto-sync = yes' > /etc/portage/repos.conf/gentoo.conf
          emerge-webrsync
          emerge --oneshot --getbinpkg sys-devel/bc
          mkdir -p /etc/portage/package.accept_keywords
          printf '%s\n' 'dev-util/catalyst ~amd64' > /etc/portage/package.accept_keywords/catalyst
          mkdir -p /etc/portage/package.use
          printf '%s\n' '>=sys-apps/util-linux-2.41.4-r1 python' '>=sys-boot/grub-2.14-r5 grub_platforms_efi-32' > /etc/portage/package.use/catalyst
          emerge --getbinpkg catalyst dev-vcs/git sys-fs/squashfs-tools sys-fs/squashfs-tools-ng sys-boot/efibootmgr

      - name: Configure catalyst
        run: |
          mkdir -p "$CATALYST_STOREDIR"
          cp -v epox/catalyst.conf /etc/catalyst/catalyst.conf
          mkdir -p /etc/catalyst
          mkdir -p /var/tmp/ccache /var/tmp/catalyst/packages /var/cache/binpkgs
          cp -rv ${{ matrix.variant.portage_dir }} ${{ matrix.variant.portage_confdir }}
          cp -v epox/env/catalystrc /etc/catalyst/env.sh

      - name: Set Gentoo mirrors
        run: |
          MIRRORS='GENTOO_MIRRORS="https://distfiles.gentoo.org https://mirror.rackspace.com/gentoo/ https://mirrors.rit.edu/gentoo/"'
          echo "export $MIRRORS" >> /etc/catalyst/env.sh
          echo "$MIRRORS" >> /etc/portage/make.conf

      - name: Cache portage binary packages
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/binpkgs
            /var/tmp/catalyst/packages
            /var/tmp/ccache
          key: catalyst-${{ hashFiles('epox/gentoo-gnome.spec', 'epox/gentoo-server.spec', 'epox/catalyst.conf', 'epox/portage/make.conf', 'epox/portage-server/make.conf') }}
          restore-keys: catalyst-

      - name: Get latest seed stage3 filename
        id: seed-version
        run: |
          set -euo pipefail
          URL="$STAGE3_BASE/latest-stage3-amd64-openrc.txt"
          echo "Fetching: $URL"
          LATEST=$(wget -q -O- "$URL" \
            | awk '{print $1}' \
            | grep -E 'stage3-amd64-openrc.*\.tar\.xz$' \
            | tail -n1)
          echo "Resolved stage3: $LATEST"
          echo "filename=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Cache seed stage3
        id: cache-seed
        uses: actions/cache@v4
        with:
          path: /var/tmp/catalyst/builds/default/stage3-amd64-openrc-latest.tar.xz
          key: seed-stage3-${{ steps.seed-version.outputs.filename }}

      - name: Download seed stage3
        if: steps.cache-seed.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          FILE="${{ steps.seed-version.outputs.filename }}"
          URL="$STAGE3_BASE/$FILE"
          mkdir -p /var/tmp/catalyst/builds/default
          wget -q "$URL" \
            -O /var/tmp/catalyst/builds/default/stage3-amd64-openrc-latest.tar.xz

      - name: Set up repository symlink for catalyst spec
        run: |
          ln -sf "$GITHUB_WORKSPACE" /repo

      - name: Create portage snapshot for catalyst
        run: |
          set -euo pipefail

          mkdir -p "$CATALYST_STOREDIR"/snapshots "$CATALYST_STOREDIR"/repos

          git clone --depth=1 \
            https://anongit.gentoo.org/git/repo/sync/gentoo.git \
            "$CATALYST_STOREDIR"/repos/gentoo

          SNAPSHOT="$CATALYST_STOREDIR"/snapshots/gentoo-stable.sqfs

          # Tar the contents of the directory (.) instead of the directory itself
          tar -C "$CATALYST_STOREDIR"/repos/gentoo \
            -cf - . \
            | tar2sqfs "$SNAPSHOT" -q -f -j1 -c gzip

      - name: Build livecd-stage2 ISO via catalyst
        run: |
          export CATALYST_STOREDIR
          catalyst -f /repo/${{ matrix.variant.spec_file }}

      - name: Install ISO extraction tools
        run: |
          emerge --getbinpkg app-cdr/cdrtools sys-fs/squashfs-tools

      - name: Create rootfs tarball from ISO
        run: |
          set -euo pipefail
          ISO="/${{ matrix.variant.iso_name }}.iso"
          SQUASHFS_PATH=$(isoinfo -R -f -i "$ISO" | grep -i '\.squashfs$' | head -n1)
          isoinfo -R -x "$SQUASHFS_PATH" -i "$ISO" > /tmp/image.squashfs
          mkdir -p /tmp/rootfs
          unsquashfs -d /tmp/rootfs /tmp/image.squashfs
          tar \
            --exclude=home/livecd \
            --exclude=root/.cache \
            --exclude=var/cache \
            --exclude=var/tmp \
            --exclude=var/db/repos \
            --exclude=var/log \
            -cJf /calcium-rootfs-${{ matrix.variant.target }}.tar.xz \
            -C /tmp/rootfs .

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.variant.iso_name }}
          path: /${{ matrix.variant.iso_name }}.iso
          compression-level: 0

      - name: Upload rootfs tarball
        uses: actions/upload-artifact@v4
        with:
          name: calcium-rootfs-${{ matrix.variant.target }}
          path: /calcium-rootfs-${{ matrix.variant.target }}.tar.xz
          compression-level: 0

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-iso
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download GNOME ISO
        uses: actions/download-artifact@v4
        with:
          name: gentoo-gnome-openrc-amd64

      - name: Download Server ISO
        uses: actions/download-artifact@v4
        with:
          name: gentoo-server-openrc-amd64

      - name: Download GNOME rootfs
        uses: actions/download-artifact@v4
        with:
          name: calcium-rootfs-gnome

      - name: Download Server rootfs
        uses: actions/download-artifact@v4
        with:
          name: calcium-rootfs-server

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            --title "Calcium OS v$VERSION" \
            --notes "Calcium OS v$VERSION release." \
            gentoo-gnome-openrc-amd64.iso \
            gentoo-server-openrc-amd64.iso \
            calcium-rootfs-gnome.tar.xz \
            calcium-rootfs-server.tar.xz

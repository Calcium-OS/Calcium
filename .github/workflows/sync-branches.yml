name: Sync branches with main

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Git identity
        run: |
          git config user.email "ci@calcium-os.org"
          git config user.name "Calcium CI"

      - name: Sync gnome-upgrade branch
        run: |
          git checkout gnome-upgrade
          git merge main -X theirs --no-edit

      - name: Sync faster-builds branch
        run: |
          git checkout faster-builds
          git merge main -X theirs --no-edit

      - name: Sync test-suite branch
        run: |
          git checkout test-suite
          git merge main -X theirs --no-edit

      - name: Push synced branches
        run: |
          git push origin gnome-upgrade --force-with-lease || echo "gnome-upgrade sync failed"
          git push origin faster-builds --force-with-lease || echo "faster-builds sync failed"
          git push origin test-suite --force-with-lease || echo "test-suite sync failed"
          git checkout main
